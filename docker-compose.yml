version: '3.8'

services:
  api:
    build: .
    container_name: cbux-api
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: cbux-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  dashboard:
    build: .
    container_name: cbux-dashboard
    command: streamlit run src/dashboard.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - "8501:8501"
    volumes:
      - ./src:/app/src
      - ./data:/app/data
    depends_on:
      - api
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: cbux-postgres
    environment:
      - POSTGRES_USER=cbux
      - POSTGRES_PASSWORD=cbux_password
      - POSTGRES_DB=cbux
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  redis_data:
  postgres_data:
